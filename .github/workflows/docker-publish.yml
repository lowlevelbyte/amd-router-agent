name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR (personal namespace)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Grandmaster0111
          password: ${{ secrets.PERSONAL_GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/grandmaster0111/amd-router-agent:latest
          provenance: false
          sbom: false
